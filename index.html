<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCO — Data Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader" role="status" aria-live="polite">
  <div class="l-logo" aria-hidden="true">CO<span>CO</span></div>
  <div class="l-track"><div class="l-fill" id="lf"></div></div>
  <div class="l-msg" id="lm">INITIALISING...</div>
</div>

<header id="topbar">
  <div class="tb-brand">
    <div class="tb-logo" aria-label="COCO">CO<span>CO</span></div>
    <div class="tb-div" aria-hidden="true"></div>
    <div class="tb-tag">DB-FIRST DATA PLATFORM</div>
  </div>
  <div class="tb-right">
    <div class="srch" role="search">
      <input id="si" placeholder="search systems, use cases…" autocomplete="off" aria-label="Search systems and use cases">
      <span class="srch-ico" aria-hidden="true">⌕</span>
      <div id="sdrop" role="listbox" aria-label="Search results"></div>
    </div>
  </div>
</header>

<nav id="filterbar" aria-label="Filter by entity">
  <button class="fb on" style="--fc:#94A3B8" onclick="setFilter('all',this)">ALL</button>
  <button class="fb" style="--fc:#FBBF24" onclick="setFilter('Development',this)">DEVELOPMENT</button>
  <button class="fb" style="--fc:#60A5FA" onclick="setFilter('Construction',this)">CONSTRUCTION</button>
  <button class="fb" style="--fc:#A78BFA" onclick="setFilter('BTR',this)">BTR</button>
  <button class="fb" style="--fc:#34D399" onclick="setFilter('Enterprise',this)">ENTERPRISE</button>
  <button class="fb" style="--fc:#FB7185" onclick="setFilter('outputs',this)">OUTPUTS</button>
</nav>

<div id="vctrls" role="toolbar" aria-label="View controls">
  <button class="vc on" id="vOrbit" onclick="setView('orbit')" aria-pressed="true">⟳ ORBIT</button>
  <button class="vc" id="vExp" onclick="toggleExplode()" aria-pressed="false">⊞ EXPLODE</button>
  <button class="vc" onclick="deselect()" aria-label="Clear selection">CLEAR</button>
  <div class="vc-div" aria-hidden="true"></div>
  <button class="vc on" id="vIso3d"   onclick="isoToggle(false)" aria-label="3D explorer view">3D EXPLORE</button>
  <button class="vc"    id="vIsoFlat" onclick="isoToggle(true)"  aria-label="Isometric platform view">⬡ ISO</button>
</div>

<main id="three-mount" aria-label="3D architecture diagram"></main>
<div id="label-layer" aria-hidden="true"></div>

<div id="iso-mount" style="display:none" aria-label="Isometric platform view">
  <div id="iso-labels" aria-hidden="true"></div>
</div>

<aside id="panel" aria-label="Node details" aria-hidden="true">
  <div class="pn-bar" id="pBar"></div>
  <div class="pn-head">
    <button class="pn-close" onclick="deselect()" aria-label="Close panel">✕</button>
    <div class="pn-layer" id="pLayer"></div>
    <div class="pn-name"  id="pName"></div>
    <div class="pn-type"  id="pType"></div>
    <div class="pn-desc"  id="pDesc"></div>
    <div class="pn-chips" id="pChips"></div>
  </div>
  <div class="pn-body" id="pBody"></div>
</aside>

<div id="key" aria-label="Node type legend">
  <div class="ki"><div class="ki-dot" style="background:#10B981" aria-hidden="true"></div><span class="ki-lbl">CENTRAL DB</span></div>
  <div class="ki"><div class="ki-dot" style="background:#3B82F6" aria-hidden="true"></div><span class="ki-lbl">CORE API</span></div>
  <div class="ki"><div class="ki-dot" style="background:#FB923C" aria-hidden="true"></div><span class="ki-lbl">AI ENGINE</span></div>
  <div class="ki"><div class="ki-dot" style="background:#64748B" aria-hidden="true"></div><span class="ki-lbl">SOURCE CONNECTOR</span></div>
  <div class="ki"><div class="ki-dot" style="background:#FB7185" aria-hidden="true"></div><span class="ki-lbl">OUTPUT CONNECTOR</span></div>
</div>

<div id="skey" aria-label="Sync frequency legend">
  <div class="sk"><div class="sk-dot" style="background:#34D399" aria-hidden="true"></div><span class="sk-lbl">LIVE</span></div>
  <div class="sk"><div class="sk-dot" style="background:#FBBF24" aria-hidden="true"></div><span class="sk-lbl">HOURLY</span></div>
  <div class="sk"><div class="sk-dot" style="background:#475569" aria-hidden="true"></div><span class="sk-lbl">NIGHTLY</span></div>
  <div class="sk"><div class="sk-dot" style="background:#334155" aria-hidden="true"></div><span class="sk-lbl">MANUAL</span></div>
</div>

<div id="kbd-hint" aria-label="Keyboard shortcuts">
  <div class="kh"><kbd>Tab</kbd><span>cycle nodes</span></div>
  <div class="kh"><kbd>Enter</kbd><span>select</span></div>
  <div class="kh"><kbd>Esc</kbd><span>deselect</span></div>
</div>

<div id="tip" role="tooltip" aria-hidden="true">
  <div class="tip-n" id="tn"></div>
  <div class="tip-t" id="tt"></div>
  <div class="tip-h">click to explore</div>
</div>

<div id="ucd" role="dialog" aria-modal="true" aria-label="Use case details" onclick="if(event.target===this)closeUCD()">
  <div class="ucd-box" id="ucdBox"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Three.js post-processing (non-module legacy builds for r128) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script src="jarvis.js"></script>
<script src="iso-app.js"></script>
</body>
</html>
